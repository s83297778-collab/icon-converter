<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PNG → ICO (в браузере)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:18px}
    .card{border:1px solid #ddd;border-radius:10px;padding:16px;max-width:800px}
    h1{margin-top:0}
    .drop{border:2px dashed #bbb;padding:20px;text-align:center;border-radius:8px;cursor:pointer;transition:.18s}
    .drop.dragover{border-color:#36f;background:#f8f8ff}
    .drop.invalid{border-color:#f33;background:#fff0f0}
    .preview{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    .preview img{width:64px;height:64px;object-fit:contain;border:1px solid #eee;padding:6px;background:#fff}
    .controls{display:flex;gap:12px;align-items:center;margin-top:12px}
    button{padding:8px 12px;border-radius:8px;border:1px solid #888;background:#f7f7f7;cursor:pointer}
    input[type=file]{display:none}
    .sizes{display:flex;gap:8px;flex-wrap:wrap}
    label.size{display:inline-flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;border:1px solid #eee;background:#fafafa}
    .hint{color:#666;font-size:13px}
    .error{color:#b00;font-weight:600}
    .ok{color:#080;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h1>PNG → ICO (в браузере)</h1>
    <p class="hint">Перетащи сюда PNG-файл или кликни, чтобы выбрать. <strong>Требуемый вход:</strong> <code>.png</code> — на выходе получаешь <code>.ico</code>.</p>

    <div id="drop" class="drop" role="button" tabindex="0">Перетащи PNG файл сюда или кликни</div>
    <input id="fileInput" type="file" accept="image/png,image/*">

    <div class="controls">
      <div>
        <strong>Размеры иконки (включить):</strong>
        <div class="sizes" id="sizesList"></div>
      </div>
      <div style="margin-left:auto">
        <button id="convertBtn" disabled>Конвертировать</button>
      </div>
    </div>

    <div class="preview" id="preview"></div>
    <p id="status" class="hint"></p>
  </div>

<script>
const AVAILABLE_SIZES = [16,24,32,48,64,96,128,256];
const DEFAULT_SELECTED = [16,32,48,64,128,256];

const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const sizesList = document.getElementById('sizesList');
const preview = document.getElementById('preview');
const convertBtn = document.getElementById('convertBtn');
const status = document.getElementById('status');

let currentFile = null;
let selectedSizes = new Set(DEFAULT_SELECTED);

function createSizeControls(){
  AVAILABLE_SIZES.forEach(s => {
    const id = 'size-' + s;
    const chk = document.createElement('input');
    chk.type = 'checkbox'; chk.dataset.size = s; chk.id = id; chk.checked = selectedSizes.has(s);
    const label = document.createElement('label');
    label.className = 'size';
    label.appendChild(chk);
    label.appendChild(document.createTextNode(' ' + s + 'px'));
    sizesList.appendChild(label);
  });
  sizesList.addEventListener('change', e => {
    if(e.target && e.target.dataset && e.target.dataset.size){
      const s = Number(e.target.dataset.size);
      if(e.target.checked) selectedSizes.add(s); else selectedSizes.delete(s);
    }
  });
}
createSizeControls();

// Utility helpers for messages
function showError(text){
  status.className = 'error';
  status.textContent = text;
  drop.classList.add('invalid');
}
function showOk(text){
  status.className = 'ok';
  status.textContent = text;
  drop.classList.remove('invalid');
}
function showInfo(text){
  status.className = 'hint';
  status.textContent = text;
  drop.classList.remove('invalid');
}

// Drag & drop handlers — cancel default to prevent Chrome opening files
['dragenter','dragover','dragleave','drop'].forEach(evt => drop.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false));

drop.addEventListener('dragover', () => drop.classList.add('dragover'));
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));

drop.addEventListener('drop', e => {
  drop.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0];
  if(!file){ showError('Пустой файл. Пожалуйста, перетащите PNG.'); return; }
  handleFile(file);
});

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files?.[0];
  if(file) handleFile(file);
});

function handleFile(file){
  // If user dropped an .ico or other non-png, provide clear message
  const nameLower = (file.name || '').toLowerCase();
  const isPNG = file.type === 'image/png' || nameLower.endsWith('.png');

  if(!file.type.startsWith('image/') && !isPNG){
    showError('Неверный формат: это не изображение. Нужен файл в формате PNG (расширение .png).');
    currentFile = null; preview.innerHTML = ''; convertBtn.disabled = true; return;
  }

  if(!isPNG){
    // Image but not PNG (e.g., JPG)
    showError('Неверный формат: нужен PNG (.png). Загруженный файл — ' + (file.type || 'неизвестного типа') + '.');
    currentFile = null; preview.innerHTML = ''; convertBtn.disabled = true; return;
  }

  // OK — it's PNG
  currentFile = file;
  showInfo('Загружаю файл...');
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      showOk(`Файл принят: ${file.name} — ${img.width}×${img.height}. Нажмите «Конвертировать».`);
      showPreview(img);
      convertBtn.disabled = false;
    };
    img.onerror = () => { showError('Не удалось прочитать изображение. Файл повреждён или имеет неподдерживаемый формат.'); };
    img.src = reader.result;
  };
  reader.onerror = () => showError('Ошибка при чтении файла. Попробуй ещё раз.');
  reader.readAsDataURL(file);
}

function showPreview(img){
  preview.innerHTML = '';
  const sizes = Array.from(selectedSizes).sort((a,b)=>a-b);
  sizes.forEach(s => {
    const c = document.createElement('canvas');
    c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    const ratio = Math.min(s / img.width, s / img.height);
    const w = Math.round(img.width * ratio);
    const h = Math.round(img.height * ratio);
    ctx.clearRect(0,0,s,s);
    ctx.drawImage(img, (s-w)/2, (s-h)/2, w, h);
    const el = document.createElement('img');
    el.src = c.toDataURL('image/png');
    el.title = s + '×' + s;
    preview.appendChild(el);
  });
}

convertBtn.addEventListener('click', async () => {
  if(!currentFile){ showError('Сначала выберите PNG файл.'); return; }
  convertBtn.disabled = true; showInfo('Готовлю иконку...');
  try{
    const arrayBuffer = await currentFile.arrayBuffer();
    const img = await loadImageFromArrayBuffer(arrayBuffer);
    const sizes = Array.from(selectedSizes).sort((a,b)=>a-b);
    const imagesData = [];
    for(const s of sizes){
      const pngData = await renderPNGForSize(img, s);
      imagesData.push({ size: s, png: pngData });
    }
    const icoBuffer = buildIco(imagesData);
    const blob = new Blob([icoBuffer], { type: 'image/x-icon' });
    const nameBase = currentFile.name.replace(/\.[^.]+$/, '') || 'icon';
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url; a.download = nameBase + '.ico';
    a.textContent = 'Скачать ' + nameBase + '.ico';
    a.style.display = 'inline-block'; a.style.marginTop = '10px';
    status.innerHTML = '';
    status.appendChild(a);

  }catch(err){
    console.error(err);
    showError('Ошибка при конвертации: ' + (err.message || err));
  } finally{
    convertBtn.disabled = false;
  }
});

// Helpers
function loadImageFromArrayBuffer(ab){
  return new Promise((resolve, reject) => {
    const blob = new Blob([ab]);
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = e => { URL.revokeObjectURL(url); reject(new Error('Invalid image')); };
    img.src = url;
  });
}

function renderPNGForSize(img, size){
  return new Promise((resolve) => {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,size,size);
    const ratio = Math.min(size / img.width, size / img.height);
    const w = Math.round(img.width * ratio);
    const h = Math.round(img.height * ratio);
    ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
    c.toBlob(blob => {
      const reader = new FileReader();
      reader.onload = () => resolve(new Uint8Array(reader.result));
      reader.readAsArrayBuffer(blob);
    }, 'image/png');
  });
}

// Build ICO binary with PNG entries
function buildIco(images){
  let imagesBuffers = images.map(it => it.png);
  const count = imagesBuffers.length;
  const headerSize = 6 + 16 * count;
  let offset = headerSize;
  const entryBuffers = [];
  let totalSize = headerSize;
  for(const buf of imagesBuffers){ totalSize += buf.length; }
  const out = new Uint8Array(totalSize);
  const dv = new DataView(out.buffer);
  dv.setUint16(0, 0, true);
  dv.setUint16(2, 1, true);
  dv.setUint16(4, count, true);
  let entryPos = 6;
  let dataPos = headerSize;
  for(let i=0;i<count;i++){
    const size = images[i].size;
    const buf = imagesBuffers[i];
    out[entryPos + 0] = size >= 256 ? 0 : size;
    out[entryPos + 1] = size >= 256 ? 0 : size;
    out[entryPos + 2] = 0;
    out[entryPos + 3] = 0;
    dv.setUint16(entryPos + 4, 1, true);
    dv.setUint16(entryPos + 6, 32, true);
    dv.setUint32(entryPos + 8, buf.length, true);
    dv.setUint32(entryPos + 12, dataPos, true);
    out.set(buf, dataPos);
    dataPos += buf.length;
    entryPos += 16;
  }
  return out.buffer;
}
</script>
</body>
</html>
